basePath: /api/v1
definitions:
  dto.AdAccountResponse:
    properties:
      account_status:
        example: 1
        type: integer
      id:
        example: act_123456789
        type: string
      name:
        example: My Ad Account
        type: string
    type: object
  dto.AdResponse:
    properties:
      adset_id:
        example: "2389876543210"
        type: string
      campaign_id:
        example: "2381234567890"
        type: string
      created_time:
        example: "2026-05-11T10:00:00Z"
        type: string
      creative:
        $ref: '#/definitions/dto.CreativeRef'
      effective_status:
        example: ACTIVE
        type: string
      id:
        example: "2386543210987"
        type: string
      name:
        example: Promo Image Ad
        type: string
      status:
        example: ACTIVE
        type: string
      updated_time:
        example: "2026-05-11T12:00:00Z"
        type: string
    type: object
  dto.AdSetResponse:
    properties:
      attribution_spec: {}
      bid_strategy:
        example: LOWEST_COST_WITHOUT_CAP
        type: string
      budget_remaining:
        example: "50000"
        type: string
      campaign_id:
        example: "2381234567890"
        type: string
      created_time:
        example: "2026-05-11T10:00:00Z"
        type: string
      daily_budget:
        example: "50000"
        type: string
      effective_status:
        example: ACTIVE
        type: string
      end_time:
        example: "2026-06-11T10:00:00Z"
        type: string
      id:
        example: "2389876543210"
        type: string
      lifetime_budget:
        example: "0"
        type: string
      name:
        example: AdSet Leads USA
        type: string
      start_time:
        example: "2026-05-11T10:00:00Z"
        type: string
      status:
        example: ACTIVE
        type: string
      updated_time:
        example: "2026-05-11T12:00:00Z"
        type: string
    type: object
  dto.AssignPermissionRequest:
    properties:
      permission_ids:
        items:
          type: integer
        type: array
    required:
    - permission_ids
    type: object
  dto.AuthUserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.CampaignResponse:
    properties:
      account_id:
        example: "541050504790549"
        type: string
      bid_strategy:
        example: LOWEST_COST_WITHOUT_CAP
        type: string
      budget_remaining:
        example: "50000"
        type: string
      buying_type:
        example: AUCTION
        type: string
      created_time:
        example: "2026-05-11T10:00:00Z"
        type: string
      daily_budget:
        example: "50000"
        type: string
      effective_status:
        example: ACTIVE
        type: string
      id:
        example: "2381234567890"
        type: string
      lifetime_budget:
        example: "0"
        type: string
      name:
        example: Summer Sale Campaign
        type: string
      objective:
        example: OUTCOMES_LEADS
        type: string
      spend_cap:
        example: "0"
        type: string
      start_time:
        example: "2026-05-11T10:00:00Z"
        type: string
      status:
        example: ACTIVE
        type: string
      stop_time:
        example: "2026-06-11T10:00:00Z"
        type: string
      updated_time:
        example: "2026-05-11T12:00:00Z"
        type: string
    type: object
  dto.CreativeRef:
    properties:
      id:
        example: "2387654321098"
        type: string
    type: object
  dto.CreativeResponse:
    properties:
      asset_feed_spec: {}
      body:
        example: Get 20% off today!
        type: string
      id:
        example: "2387654321098"
        type: string
      image_url:
        example: https://scontent.xx.fbcdn.net/...
        type: string
      name:
        example: Creative Promo 1
        type: string
      object_story_spec: {}
      thumbnail_url:
        example: https://scontent.xx.fbcdn.net/...
        type: string
      title:
        example: Special Offer
        type: string
      url_tags:
        example: utm_source=facebook&utm_medium=cpc
        type: string
    type: object
  dto.InsightResponse:
    properties:
      account_currency:
        example: USD
        type: string
      account_id:
        example: "541050504790549"
        type: string
      account_name:
        example: My Ad Account
        type: string
      action_values: {}
      actions: {}
      ad_id:
        example: "2386543210987"
        type: string
      ad_name:
        example: Promo Image Ad
        type: string
      adset_id:
        example: "2389876543210"
        type: string
      adset_name:
        example: AdSet Leads USA
        type: string
      campaign_id:
        example: "2381234567890"
        type: string
      campaign_name:
        example: Summer Sale Campaign
        type: string
      clicks:
        example: "350"
        type: string
      cost_per_action_type: {}
      cpc:
        example: "0.36"
        type: string
      cpm:
        example: "8.26"
        type: string
      ctr:
        example: "2.30"
        type: string
      date_start:
        example: "2026-04-11"
        type: string
      date_stop:
        example: "2026-05-11"
        type: string
      impressions:
        example: "15200"
        type: string
      inline_link_click_ctr:
        example: "2.0"
        type: string
      inline_link_clicks:
        example: "300"
        type: string
      objective:
        example: OUTCOMES_LEADS
        type: string
      reach:
        example: "12000"
        type: string
      spend:
        example: "125.50"
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      centrifugo_token:
        type: string
      permissions:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
      token:
        type: string
      user:
        $ref: '#/definitions/dto.AuthUserResponse'
    type: object
  dto.PermissionRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.PermissionResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.RoleBrief:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.RoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.RoleResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/dto.PermissionResponse'
        type: array
    type: object
  dto.UserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role_ids:
        items:
          type: integer
        type: array
    required:
    - email
    - name
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      roles:
        items:
          $ref: '#/definitions/dto.RoleBrief'
        type: array
    type: object
  response.ErrorResponse:
    properties:
      errors: {}
      message:
        example: Error message
        type: string
      success:
        example: false
        type: boolean
    type: object
  response.Meta:
    properties:
      last_page:
        type: integer
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  response.MetaPaging:
    properties:
      cursors:
        properties:
          after:
            type: string
          before:
            type: string
        type: object
      has_next:
        type: boolean
      has_previous:
        type: boolean
    type: object
  response.PaginationMeta:
    properties:
      last_page:
        type: integer
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  response.PaginationResponse:
    properties:
      data: {}
      message:
        example: Success
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        example: true
        type: boolean
    type: object
  response.Response:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      paging:
        $ref: '#/definitions/response.MetaPaging'
      success:
        type: boolean
    type: object
  response.SuccessResponse:
    properties:
      data: {}
      message:
        example: Success
        type: string
      success:
        example: true
        type: boolean
    type: object
  sync.MetaSyncBatch:
    properties:
      ad_account_id:
        type: string
      ad_account_name:
        type: string
      batch_code:
        type: string
      created_at:
        type: string
      date_preset:
        type: string
      date_start:
        type: string
      date_stop:
        type: string
      duration_ms:
        type: integer
      error_message:
        type: string
      failed_count:
        type: integer
      finished_at:
        type: string
      id:
        type: integer
      inserted_count:
        type: integer
      metadata:
        type: object
      provider:
        type: string
      rate_limit_hit:
        type: boolean
      request_count:
        type: integer
      skipped_count:
        type: integer
      started_at:
        type: string
      status:
        type: string
      steps:
        items:
          $ref: '#/definitions/sync.MetaSyncStep'
        type: array
      sync_mode:
        type: string
      sync_scope:
        type: string
      total_records:
        type: integer
      updated_at:
        type: string
      updated_count:
        type: integer
    type: object
  sync.MetaSyncStep:
    properties:
      batch:
        $ref: '#/definitions/sync.MetaSyncBatch'
      batch_id:
        type: integer
      created_at:
        type: string
      cursor_after:
        type: string
      cursor_before:
        type: string
      duration_ms:
        type: integer
      endpoint:
        type: string
      error_code:
        type: string
      error_message:
        type: string
      failed_count:
        type: integer
      finished_at:
        type: string
      has_next:
        type: boolean
      id:
        type: integer
      inserted_count:
        type: integer
      metadata:
        type: object
      request_count:
        type: integer
      skipped_count:
        type: integer
      started_at:
        type: string
      status:
        type: string
      sync_type:
        type: string
      total_records:
        type: integer
      updated_at:
        type: string
      updated_count:
        type: integer
    type: object
host: localhost:8888
info:
  contact: {}
  description: ERP Ready Backend for Meta Ads & Business Management
  title: Ads Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return token
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login
      tags:
      - Authentication
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user (Clear session/token)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - Authentication
  /meta/ad-accounts:
    get:
      consumes:
      - application/json
      description: Retrieve all ad accounts associated with the system user token
      parameters:
      - description: Custom fields comma-separated preset
        in: query
        name: fields
        type: string
      - description: Pagination limit
        in: query
        name: limit
        type: string
      - description: Cursor after
        in: query
        name: after
        type: string
      - description: Cursor before
        in: query
        name: before
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AdAccountResponse'
                  type: array
                paging:
                  $ref: '#/definitions/response.MetaPaging'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Meta Ad Accounts
      tags:
      - Meta Ad Accounts
  /meta/ads:
    get:
      consumes:
      - application/json
      description: Retrieve ads from local database (synced from Meta)
      parameters:
      - description: Filter by campaign ID
        in: query
        name: campaign_id
        type: string
      - description: Filter by adset ID
        in: query
        name: adset_id
        type: string
      - description: Filter by status (ACTIVE, PAUSED, etc)
        in: query
        name: status
        type: string
      - description: Search by ad name
        in: query
        name: search
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AdResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.PaginationMeta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Ads
      tags:
      - Meta Ads
  /meta/adsets:
    get:
      consumes:
      - application/json
      description: Retrieve adsets from local database (synced from Meta)
      parameters:
      - description: Filter by campaign ID
        in: query
        name: campaign_id
        type: string
      - description: Filter by status (ACTIVE, PAUSED, etc)
        in: query
        name: status
        type: string
      - description: Search by adset name
        in: query
        name: search
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AdSetResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.PaginationMeta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get AdSets
      tags:
      - Meta AdSets
  /meta/campaigns:
    get:
      consumes:
      - application/json
      description: Retrieve campaigns from local database (synced from Meta)
      parameters:
      - description: Ad Account ID (falls back to config.MetaAdAccountID)
        in: query
        name: ad_account_id
        type: string
      - description: Filter by status (ACTIVE, PAUSED, etc)
        in: query
        name: status
        type: string
      - description: Search by campaign name
        in: query
        name: search
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.CampaignResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.PaginationMeta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Campaigns
      tags:
      - Meta Campaigns
  /meta/creatives/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve details of a specific ad creative (direct Meta API call)
      parameters:
      - description: Creative ID
        in: path
        name: id
        required: true
        type: string
      - description: Custom fields comma-separated preset
        in: query
        name: fields
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CreativeResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Ad Creative
      tags:
      - Meta Ads
  /meta/dashboard/campaigns:
    get:
      consumes:
      - application/json
      description: Returns campaigns with performance metrics (spend, impressions,
        reach, actions) joined from insights and adsets
      parameters:
      - description: Ad Account ID (falls back to config)
        in: query
        name: ad_account_id
        type: string
      - description: Filter by campaign status (ACTIVE, PAUSED, etc)
        in: query
        name: status
        type: string
      - description: Search by campaign name
        in: query
        name: search
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Campaign Dashboard
      tags:
      - Meta Dashboard
  /meta/insights/ad:
    get:
      consumes:
      - application/json
      description: Retrieve ad-level insights from local database (synced from Meta)
      parameters:
      - description: Filter by account ID
        in: query
        name: account_id
        type: string
      - description: Filter by campaign ID
        in: query
        name: campaign_id
        type: string
      - description: Filter by adset ID
        in: query
        name: adset_id
        type: string
      - description: Filter by ad ID
        in: query
        name: ad_id
        type: string
      - description: Filter by date start (YYYY-MM-DD)
        in: query
        name: date_start
        type: string
      - description: Filter by date stop (YYYY-MM-DD)
        in: query
        name: date_stop
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.InsightResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.PaginationMeta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Ad Insights
      tags:
      - Meta Insights
  /meta/insights/campaign:
    get:
      consumes:
      - application/json
      description: Retrieve campaign-level insights from local database (synced from
        Meta)
      parameters:
      - description: Filter by account ID
        in: query
        name: account_id
        type: string
      - description: Filter by campaign ID
        in: query
        name: campaign_id
        type: string
      - description: Filter by date start (YYYY-MM-DD)
        in: query
        name: date_start
        type: string
      - description: Filter by date stop (YYYY-MM-DD)
        in: query
        name: date_stop
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.InsightResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.PaginationMeta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get Campaign Insights
      tags:
      - Meta Insights
  /meta/sync:
    post:
      description: Manually trigger a full Meta Ads sync. Returns immediately; subscribe
        to the Centrifugo channel for real-time progress.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Sync already in progress
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger Meta Ads Sync
      tags:
      - Meta Sync
  /meta/sync/batches:
    get:
      description: Returns a paginated list of sync batches ordered by most recent
        first.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.PaginationResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/sync.MetaSyncBatch'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
